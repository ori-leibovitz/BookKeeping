<!DOCTYPE html>
<html lang="he" dir="rtl" data-bs-theme="dark"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת בנקאות - Cyber Style</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-5">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-shield-alt"></i> Secure Bank</a>
            <div class="d-flex" id="nav-user-info" style="display: none !important;">
                <span class="navbar-text me-3" id="user-greeting"></span>
                <button class="btn btn-outline-light btn-sm" onclick="logout()">התנתק</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div id="alert-container"></div>

        <div id="auth-view" class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-body p-4">
                        <h3 class="text-center mb-4">כניסה למערכת</h3>
                        
                        <ul class="nav nav-tabs nav-fill mb-4" id="authTabs" role="tablist">
                            <li class="nav-item">
                                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#login-tab">התחברות</button>
                            </li>
                            <li class="nav-item">
                                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#register-tab">הרשמה</button>
                            </li>
                        </ul>

                        <div class="tab-content">
                            <div class="tab-pane fade show active" id="login-tab">
                                <form id="login-form">
                                    <div class="mb-3">
                                        <label class="form-label">אימייל</label>
                                        <input type="email" class="form-control" id="login-email" required placeholder="user@example.com">
                                    </div>
                                    <div class="mb-4">
                                        <label class="form-label">סיסמה</label>
                                        <input type="password" class="form-control" id="login-password" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100 py-2">התחבר <i class="fas fa-arrow-left me-2"></i></button>
                                </form>
                            </div>

                            <div class="tab-pane fade" id="register-tab">
                                <form id="register-form">
                                    <div class="row">
                                        <div class="col-6 mb-3">
                                            <label class="form-label">שם פרטי</label>
                                            <input type="text" class="form-control" id="reg-first" required>
                                        </div>
                                        <div class="col-6 mb-3">
                                            <label class="form-label">שם משפחה</label>
                                            <input type="text" class="form-control" id="reg-last" required>
                                        </div>
                                    </div>
                                    <div class="mb-3">
                                        <label class="form-label">אימייל</label>
                                        <input type="email" class="form-control" id="reg-email" required>
                                    </div>
                                    <div class="mb-4">
                                        <label class="form-label">סיסמה</label>
                                        <input type="password" class="form-control" id="reg-password" required>
                                    </div>
                                    <button type="submit" class="btn btn-primary w-100 py-2">הירשם למערכת</button>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="dashboard-view" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">החשבונות שלי</h2>
                <button class="btn btn-primary" onclick="openCreateAccountModal()">
                    <i class="fas fa-plus"></i> חשבון חדש
                </button>
            </div>
            <div id="accounts-list" class="row"></div>
        </div>

        <div id="account-details-view" style="display: none;">
            <button class="btn btn-outline-light mb-4" onclick="showDashboard()">
                <i class="fas fa-arrow-right"></i> חזרה לראשי
            </button>
            
            <div class="card mb-4 border-0" style="background: linear-gradient(135deg, #1a1a1a 0%, #0d0d0d 100%);">
                <div class="card-body text-center py-5">
                    <h5 class="text-secondary mb-2" id="detail-acc-number"></h5>
                    <h1 class="display-3 fw-bold mb-3 text-white" id="detail-acc-balance"></h1>
                    <span class="badge bg-dark border border-secondary text-secondary mb-4 p-2" id="detail-acc-type"></span>
                    
                    <div class="d-flex justify-content-center gap-3 mt-4">
                        <button class="btn btn-outline-success btn-lg px-4" onclick="openActionModal('deposit')">
                            <i class="fas fa-arrow-down"></i> הפקדה
                        </button>
                        <button class="btn btn-outline-danger btn-lg px-4" onclick="openActionModal('withdraw')">
                            <i class="fas fa-arrow-up"></i> משיכה
                        </button>
                        <button class="btn btn-primary btn-lg px-4" onclick="openActionModal('transfer')">
                            <i class="fas fa-exchange-alt"></i> העברה
                        </button>
                    </div>
                </div>
            </div>

            <h4 class="mb-3">פעולות אחרונות</h4>
            <div class="card">
                <div class="table-responsive">
                    <table class="table table-hover mb-0 align-middle">
                        <thead>
                            <tr>
                                <th>תאריך</th>
                                <th>סוג פעולה</th>
                                <th>פרטים</th>
                                <th class="text-end">סכום</th>
                            </tr>
                        </thead>
                        <tbody id="transactions-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createAccountModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title">פתיחת חשבון</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <label class="form-label">סוג חשבון</label>
                    <select class="form-select" id="new-acc-type">
                        <option value="checking">עובר ושב (Checking)</option>
                        <option value="savings">חיסכון (Savings)</option>
                    </select>
                </div>
                <div class="modal-footer border-top-0">
                    <button type="button" class="btn btn-primary w-100" onclick="createAccount()">אישור</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="transactionModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-bottom-0">
                    <h5 class="modal-title" id="trans-modal-title">פעולה</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="trans-type">
                    <div class="mb-3" id="dest-account-group" style="display: none;">
                        <label class="form-label">חשבון יעד (UUID)</label>
                        <input type="text" class="form-control" id="trans-dest-acc">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">סכום ($)</label>
                        <input type="number" class="form-control form-control-lg" id="trans-amount" step="0.01">
                    </div>
                </div>
                <div class="modal-footer border-top-0">
                    <button type="button" class="btn btn-primary w-100" onclick="submitTransaction()">בצע פעולה</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
