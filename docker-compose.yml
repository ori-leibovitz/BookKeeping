version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:13
    container_name: bookkeeping-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-example}
      POSTGRES_DB: ${DB_NAME:-mydatabase}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./tables.sql:/docker-entrypoint-initdb.d/tables.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Zookeeper
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_PORT:-2181}
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "${ZOOKEEPER_PORT:-2181}:2181"

  # Kafka
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "${KAFKA_PORT:-9092}:9092"
      - "${KAFKA_EXTERNAL_PORT:-9093}:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:${ZOOKEEPER_PORT:-2181}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      

  # Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    restart: unless-stopped

  # Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
    restart: unless-stopped
    depends_on:
      - prometheus

# User Service (gRPC)
  user-service:
    build: ./user-service
    container_name: user-service
    ports:
      - "${USER_SERVICE_PORT:-5001}:5001"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-example}@db:5432/${DB_NAME:-mydatabase}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-my-super-secret-jwt-key-2024}
      - SERVICE_PORT=${USER_SERVICE_PORT:-5001}
    depends_on:
      db:
        condition: service_healthy
    command: python server.py

  # Account Service (REST)
  account-service:
    build: ./account-service
    container_name: account-service
    ports:
      - "${ACCOUNT_SERVICE_PORT:-5002}:5002"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-example}@db:5432/${DB_NAME:-mydatabase}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-my-super-secret-jwt-key-2024}
      - USER_SERVICE_URL=user-service:${USER_SERVICE_PORT:-5001}
      - SERVICE_PORT=${ACCOUNT_SERVICE_PORT:-5002}
    depends_on:
      db:
        condition: service_healthy
    command: python app.py

  # Transaction Service (REST)
  transaction-service:
    build: ./transaction-service
    container_name: transaction-service
    ports:
      - "${TRANSACTION_SERVICE_PORT:-5003}:5003"
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-example}@db:5432/${DB_NAME:-mydatabase}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-my-super-secret-jwt-key-2024}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:${KAFKA_PORT:-9092}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - SERVICE_PORT=${TRANSACTION_SERVICE_PORT:-5003}
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python app.py

  # Transfer Processor
  transfer-processor:
    build: ./transfer-processor
    container_name: transfer-processor
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-example}@db:5432/${DB_NAME:-mydatabase}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:${KAFKA_PORT:-9092}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - NOTIFICATION_SERVICE_URL=http://notification-service:${NOTIFICATION_SERVICE_PORT:-5004}
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python processor.py

  # Notification Service (REST)
  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT:-5004}:5004"
    environment:
      - EMAIL_ENABLED=${EMAIL_ENABLED:-false}
      - SMS_ENABLED=${SMS_ENABLED:-false}
      - SERVICE_PORT=${NOTIFICATION_SERVICE_PORT:-5004}
    command: python app.py

volumes:
  postgres_data:
  prometheus_data:
  grafana_data: